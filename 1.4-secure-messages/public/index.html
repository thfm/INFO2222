<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E Encrypted Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            height: 90vh;
            max-height: 800px;
        }

        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .client-id {
            font-size: 12px;
            opacity: 0.8;
            font-family: monospace;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message>div {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }

        .message.sent>div {
            align-items: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-break: break-word;
            white-space: normal;
            overflow-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received .message-bubble {
            background: #f0f0f0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 4px;
            padding: 0 4px;
        }

        .message.sent .message-time {
            text-align: right;
        }

        .input-area {
            border-top: 1px solid #eee;
            padding: 16px;
            display: flex;
            gap: 8px;
            background: #f9f9f9;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 14px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            font-size: 12px;
            padding: 8px 16px;
            text-align: center;
            background: #fff3cd;
            color: #856404;
            border-bottom: 1px solid #ffeeba;
        }

        .status.connected {
            background: #d4edda;
            color: #155724;
            border-bottom-color: #c3e6cb;
        }

        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border-bottom-color: #f5c6cb;
        }

        .clients-list {
            font-size: 12px;
            margin-top: 8px;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 6px;
            max-height: 100px;
            overflow-y: auto;
        }

        .client-item {
            padding: 4px;
            margin: 2px 0;
            background: white;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
        }

        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
            flex-direction: column;
            gap: 12px;
        }

        .empty-state p {
            max-width: 200px;
        }

        .lock-icon {
            font-size: 24px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="chat-window">
            <div class="chat-header">
                <div>
                    <div>Chat 1</div>
                    <div class="client-id" id="clientId1">Loading...</div>
                </div>
                <div class="lock-icon">🔒</div>
            </div>
            <div class="status disconnected" id="status1">Connecting...</div>
            <div class="clients-list" id="clientsList1"></div>
            <div class="messages-container" id="messages1">
                <div class="empty-state">
                    <div class="lock-icon">🔒</div>
                    <p>Waiting for messages...</p>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="input1" placeholder="Type a message..." disabled>
                <button id="send1" disabled>Send</button>
            </div>
        </div>

        <div class="chat-window">
            <div class="chat-header">
                <div>
                    <div>Chat 2</div>
                    <div class="client-id" id="clientId2">Loading...</div>
                </div>
                <div class="lock-icon">🔒</div>
            </div>
            <div class="status disconnected" id="status2">Connecting...</div>
            <div class="clients-list" id="clientsList2"></div>
            <div class="messages-container" id="messages2">
                <div class="empty-state">
                    <div class="lock-icon">🔒</div>
                    <p>Waiting for messages...</p>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="input2" placeholder="Type a message..." disabled>
                <button id="send2" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="encryption.js"></script>
    <script src="chat.js"></script>
</body>

</html>
