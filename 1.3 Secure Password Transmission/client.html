<!DOCTYPE html>
<html>
<head>
    <title>Secure Client - TLS 1.3 Simulation</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #h-btn { background: #1a73e8; color: white; }
        #s-btn { background: #ccc; color: #666; cursor: not-allowed; }
        .log-box { background: #222; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 20px; border-radius: 4px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #1a73e8; margin-top: 0;">TLS 1.3 Login</h2>
        <p id="status-text" style="font-size: 0.8em; color: #d93025;">Status: Socket Disconnected</p>
        
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        
        <button onclick="performHandshake()" id="h-btn">1. Establish TLS 1.3 Tunnel</button>
        <button onclick="sendLogin()" id="s-btn" disabled>2. Secure Login</button>

        <div class="log-box" id="client-logs">
            > Waiting for connection...
        </div>
    </div>

    <script>
        const logArea = document.getElementById('client-logs');
        const statusText = document.getElementById('status-text');
        const hBtn = document.getElementById('h-btn');
        const sBtn = document.getElementById('s-btn');

        // Connect to your Python server
        const socket = new WebSocket('ws://127.0.0.1:8765');

        function addLog(msg) {
            logArea.innerHTML += `<div>> ${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
        }

        socket.onopen = () => {
            statusText.innerText = "Status: Socket Connected (Unsecured)";
            statusText.style.color = "#f4b400";
            addLog("WebSocket link established.");
        };

        function performHandshake() {
            addLog("Starting TLS 1.3 Handshake...");
            socket.send(JSON.stringify({ action: "HANDSHAKE" }));
            hBtn.innerText = "Processing Handshake...";
            hBtn.style.background = "#f4b400";
        }

        async function sendLogin() {
            const password = document.getElementById('pass').value;
            if(!password) return alert("Enter a password first!");

            addLog("Encrypting payload with AES-GCM...");
            
            // Simulating TLS 1.3 encrypted blob (Base64)
            const encryptedBlob = btoa("TLS1.3_CIPHER_" + password + "_" + Date.now());
            
            socket.send(JSON.stringify({ 
                action: "LOGIN", 
                payload: encryptedBlob,
                source: "SECURE_CLIENT" 
            }));
            addLog("Encrypted packet sent to server.");
        }

        socket.onmessage = (e) => {
            const res = JSON.parse(e.data);
            
            if(res.status === "HANDSHAKE_COMPLETE") {
                addLog("TLS 1.3 Tunnel Active (Keys Exchanged)");
                statusText.innerText = "Status: TLS 1.3 SECURE";
                statusText.style.color = "#34a853";
                
                // Enable the second button
                hBtn.style.display = "none";
                sBtn.disabled = false;
                sBtn.style.background = "#34a853";
                sBtn.style.color = "white";
                sBtn.style.cursor = "pointer";
            } else if (res.status === "SUCCESS") {
                addLog("Server Response: " + res.msg);
                alert("Login Success! Packet was encrypted.");
            }
        };

        socket.onerror = () => {
            addLog("ERROR: Cannot connect to server. Is New_server.py running?");
        };
    </script>
</body>
</html>
