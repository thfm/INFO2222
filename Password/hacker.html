<!DOCTYPE html>
<html>
<head><title>Hacker Sniffer Console</title></head>
<body style="background:#0d0d0d; color:#00ff41; font-family: 'Courier New', Courier, monospace; padding: 20px;">
    <h2>[NETWORK SNIFFER - PORT 8765]</h2>
    <div id="monitor" style="border:1px solid #00ff41; height:400px; padding:15px; overflow-y:auto; background:rgba(0,255,65,0.05);">
        > System Online. Waiting for traffic...
    </div>

    <script>
        const socket = new WebSocket('ws://127.0.0.1:8765');
const monitor = document.getElementById('monitor');

function log(msg, color="#00ff41") {
    const timestamp = new Date().toLocaleTimeString();
    monitor.innerHTML += `<p style="color:${color}; margin:5px 0;">[${timestamp}] > ${msg}</p>`;
    monitor.scrollTop = monitor.scrollHeight;
}

socket.onmessage = (e) => {
    const data = JSON.parse(e.data);
    
    // 1. Detect Handshake
    if(data.status === "HANDSHAKE_COMPLETE") {
        log("INTERCEPTED: TLS 1.3 Handshake Initiated", "#ff9900");
        log("RESULT: Key Exchange hidden from sniffer.");
    } 
    // 2. Detect Login Attempt (Simulation of sniffing the data packet)
    else if (data.status === "SUCCESS") {
        log("INTERCEPTED: Encrypted Data Packet Detected!", "#00ff41");
        // We simulate the hacker seeing the raw ciphertext from the wire
        log("RAW PAYLOAD: VExTMS4zX0NJUEhFUl9zeXN0ZW1zXzE3MTQ...", "#555");
        log("STATUS: Decryption failed. Strong AES-GCM detected.");
    }
};

socket.onopen = () => log("Sniffer Engine Online. Listening on Port 8765...");
socket.onerror = () => log("ERROR: Disconnected from network pipe.", "red");
    </script>
</body>
</html>
